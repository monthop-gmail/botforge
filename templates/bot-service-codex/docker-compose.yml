services:
  # OpenAI Codex CLI API server
  server:
    build: ./server
    container_name: {{CONTAINER_PREFIX}}-server
    environment:
      - CODEX_API_KEY=${CODEX_API_KEY:-}
      - OPENAI_API_KEY=${CODEX_API_KEY:-}
      - API_PASSWORD=${API_PASSWORD:-}
      - CODEX_MODEL=${CODEX_MODEL:-o4-mini}
      - CODEX_TIMEOUT_MS=${CODEX_TIMEOUT_MS:-300000}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - PORT=4096
      - WORKSPACE_DIR=/workspace
    volumes:
      - ${PROJECT_DIR:-./workspace}:/workspace
      # Mount host ~/.codex to reuse ChatGPT login (no API key needed)
      - ${CODEX_HOME:-~/.codex}:/home/node/.codex
    restart: unless-stopped

  # LINE bot - bridges LINE messages to Codex server
  line-bot:
    build: .
    container_name: {{CONTAINER_PREFIX}}-line-bot
    environment:
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - SERVER_URL=http://server:4096
      - SERVER_PASSWORD=${API_PASSWORD:-}
      - PROMPT_TIMEOUT_MS=${PROMPT_TIMEOUT_MS:-300000}
      - PORT=3000
    depends_on:
      - server
    restart: unless-stopped

  # Cloudflare tunnel - exposes LINE webhook to internet
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: {{CONTAINER_PREFIX}}-tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - line-bot
    restart: unless-stopped
