services:
  # Gocode AI server (Go + OpenAI-compatible LLM)
  server:
    build: ./server
    container_name: {{CONTAINER_PREFIX}}-server
    environment:
      - GOCODE_API_KEY=${GOCODE_API_KEY:-}
      - GOCODE_BASE_URL=${GOCODE_BASE_URL:-}
      - GOCODE_MODEL=${GOCODE_MODEL:-}
    volumes:
      - ${PROJECT_DIR:-./workspace}:/workspace/project
      - ./server/config.example.yaml:/workspace/config.yaml:ro
    command: ["serve", "--host", "0.0.0.0", "--port", "4096", "--config", "/workspace/config.yaml"]
    restart: unless-stopped

  # LINE bot - bridges LINE messages to gocode server
  line-bot:
    build: .
    container_name: {{CONTAINER_PREFIX}}-line-bot
    environment:
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - PORT=3000
      - GOCODE_URL=http://server:4096
      - LINE_OA_URL=${LINE_OA_URL:-}
      - PROMPT_TIMEOUT_MS=${PROMPT_TIMEOUT_MS:-120000}
    depends_on:
      - server
    restart: unless-stopped

  # Cloudflare tunnel - exposes LINE webhook to internet
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: {{CONTAINER_PREFIX}}-tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - line-bot
    restart: unless-stopped
