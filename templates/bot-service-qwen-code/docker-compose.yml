services:
  # Qwen Code CLI API server
  server:
    build: ./server
    container_name: {{CONTAINER_PREFIX}}-server
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - API_PASSWORD=${API_PASSWORD:-}
      - QWEN_MODEL=${QWEN_MODEL:-qwen3.5-plus}
      - QWEN_TIMEOUT_MS=${QWEN_TIMEOUT_MS:-300000}
      - QWEN_SANDBOX=false
      - PORT=4096
      - WORKSPACE_DIR=/workspace
    volumes:
      - ${PROJECT_DIR:-./workspace}:/workspace
      # Mount host ~/.qwen to reuse OAuth login (no API key needed)
      - ${QWEN_HOME:-~/.qwen}:/home/node/.qwen
    restart: unless-stopped

  # LINE bot - bridges LINE messages to Qwen Code server
  line-bot:
    build: .
    container_name: {{CONTAINER_PREFIX}}-line-bot
    environment:
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - SERVER_URL=http://server:4096
      - SERVER_PASSWORD=${API_PASSWORD:-}
      - PROMPT_TIMEOUT_MS=${PROMPT_TIMEOUT_MS:-300000}
      - PORT=3000
    depends_on:
      - server
    restart: unless-stopped

  # Cloudflare tunnel - exposes LINE webhook to internet
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: {{CONTAINER_PREFIX}}-tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - line-bot
    restart: unless-stopped

